apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      serviceAccountName: kubectl-access-ollama
      containers:
        - name: ollama
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          ports:
            - containerPort: 11434
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    sleep 5
                    curl http://localhost:11434/api/generate -d '{"model":"qwen3.5:9b","prompt":"hi"}'
          env:
            - name: OLLAMA_LOG_LEVEL
              value: "debug"
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: OLLAMA_KEEP_ALIVE
              value: "-1"
            - name: KUBECTL_AI_TIMEOUT
              value: "300"
